<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>breadcrumbles.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --border: rgba(255,255,255,0.08);
      --border-bright: rgba(255,255,255,0.15);
      --text: #f0eff5;
      --muted: #7a798a;
      --accent1: #b4f26e;   /* lime green – level 1 */
      --accent2: #6ec9f2;   /* cyan – level 2 */
      --accent3: #f26eb4;   /* pink – level 3 */
      --font-head: 'Syne', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-head);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── noise grain overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── ambient glow blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.12;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--accent1); top: -150px; right: -100px; }
    .blob-2 { width: 400px; height: 400px; background: var(--accent3); bottom: -100px; left: -100px; }

    /* ── layout ── */
    .wrapper {
      position: relative; z-index: 1;
      max-width: 820px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    /* ── header ── */
    header { margin-bottom: 3.5rem; }

    .logo {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: 1.05rem; letter-spacing: 0.04em;
      color: var(--muted);
      margin-bottom: 2rem;
    }
    .logo-crumb {
      display: flex; gap: 4px;
    }
    .logo-crumb span {
      width: 7px; height: 7px; border-radius: 50%;
    }
    .logo-crumb span:nth-child(1) { background: var(--accent1); }
    .logo-crumb span:nth-child(2) { background: var(--accent2); }
    .logo-crumb span:nth-child(3) { background: var(--accent3); }

    h1 {
      font-size: clamp(2.8rem, 6vw, 4.5rem);
      font-weight: 800;
      line-height: 1.0;
      letter-spacing: -0.03em;
    }
    h1 .dim { color: var(--muted); }
    h1 .hi { color: var(--accent1); }

    .tagline {
      margin-top: 1rem;
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    /* ── input section ── */
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      margin-bottom: 2rem;
    }

    .input-card label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.88rem;
      line-height: 1.7;
      padding: 1rem 1.25rem;
      resize: vertical;
      min-height: 130px;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea::placeholder { color: var(--muted); }
    textarea:focus { border-color: var(--border-bright); }

    .input-meta {
      display: flex; align-items: center; gap: 1rem; margin-top: 1rem;
    }
    .lang-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-head);
      font-size: 0.85rem;
      padding: 0.4rem 0.75rem;
      outline: none;
      cursor: pointer;
    }

    /* ── hint level buttons ── */
    .hint-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 2.5rem;
    }

    .hint-btn {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1rem;
      cursor: pointer;
      text-align: left;
      color: var(--text);
      font-family: var(--font-head);
      transition: border-color 0.2s, transform 0.15s;
      overflow: hidden;
    }
    .hint-btn:hover { border-color: var(--border-bright); transform: translateY(-2px); }
    .hint-btn:active { transform: translateY(0); }
    .hint-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .hint-btn::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
    }
    .hint-btn[data-level="1"]::before { background: var(--accent1); }
    .hint-btn[data-level="2"]::before { background: var(--accent2); }
    .hint-btn[data-level="3"]::before { background: var(--accent3); }

    .btn-level {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }
    .hint-btn[data-level="1"] .btn-level { color: var(--accent1); }
    .hint-btn[data-level="2"] .btn-level { color: var(--accent2); }
    .hint-btn[data-level="3"] .btn-level { color: var(--accent3); }

    .btn-title {
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1.2;
    }
    .btn-desc {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.3rem;
      line-height: 1.4;
    }

    /* ── response area ── */
    .response-area {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .response-area.visible { display: block; }

    .response-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .response-badge {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.75rem;
      border-radius: 20px;
      font-weight: 600;
    }
    .badge-1 { background: rgba(180,242,110,0.12); color: var(--accent1); }
    .badge-2 { background: rgba(110,201,242,0.12); color: var(--accent2); }
    .badge-3 { background: rgba(242,110,180,0.12); color: var(--accent3); }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: var(--font-head);
      font-size: 0.78rem;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .copy-btn:hover { color: var(--text); border-color: var(--border-bright); }

    .response-body {
      padding: 1.5rem;
      font-family: var(--font-mono);
      font-size: 0.87rem;
      line-height: 1.8;
      color: #d0d0e0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* loading dots */
    .loading {
      display: flex; gap: 6px; align-items: center;
      padding: 1.5rem;
    }
    .loading span {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .loading span:nth-child(2) { animation-delay: 0.2s; }
    .loading span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ── error ── */
    .error-msg {
      display: none;
      padding: 1rem 1.5rem;
      background: rgba(242,110,110,0.08);
      border: 1px solid rgba(242,110,110,0.2);
      border-radius: 12px;
      color: #f26e6e;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      font-family: var(--font-mono);
    }
    .error-msg.visible { display: block; }

    /* ── footer ── */
    footer {
      position: relative; z-index: 1;
      text-align: center;
      padding: 2rem;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ── api url config ── */
    .config-row {
      display: flex; align-items: center; gap: 8px;
      margin-top: 0.75rem;
    }
    .config-row input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      padding: 0.35rem 0.7rem;
      outline: none;
    }
    .config-row input:focus { border-color: var(--border-bright); color: var(--text); }
    .config-label { font-size: 0.72rem; color: var(--muted); white-space: nowrap; }

    @media (max-width: 600px) {
      .hint-buttons { grid-template-columns: 1fr; }
      h1 { font-size: 2.5rem; }
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="wrapper">
    <header>
      <div class="logo">
        <div class="logo-crumb">
          <span></span><span></span><span></span>
        </div>
        breadcrumbles.ai
      </div>
      <h1>
        <span class="dim">stuck on</span><br>
        <span class="hi">dsa?</span><br>
        <span class="dim">follow the crumbs.</span>
      </h1>
      <p class="tagline">three levels of hints — just enough to keep you unstuck.</p>
    </header>

    <!-- Problem Input -->
    <div class="input-card">
      <label for="problem-input">your problem</label>
      <textarea
        id="problem-input"
        placeholder="e.g. Given an array of integers, find two numbers that add up to a target sum. Return their indices..."
        rows="5"
      ></textarea>
      <div class="input-meta">
        <select class="lang-select" id="lang-select">
          <option value="Python">Python</option>
          <option value="JavaScript">JavaScript</option>
          <option value="Java">Java</option>
          <option value="C++">C++</option>
          <option value="Go">Go</option>
          <option value="Rust">Rust</option>
        </select>
        <div class="config-row" style="flex:1;">
          <span class="config-label">API:</span>
          <input type="text" id="api-base" value="http://localhost:8000" placeholder="http://localhost:8000" />
        </div>
      </div>
    </div>

    <!-- Hint Buttons -->
    <div class="hint-buttons">
      <button class="hint-btn" data-level="1" onclick="getHint(1)">
        <div class="btn-level">Level 1</div>
        <div class="btn-title">Slight Hint</div>
        <div class="btn-desc">a gentle nudge, no spoilers</div>
      </button>
      <button class="hint-btn" data-level="2" onclick="getHint(2)">
        <div class="btn-level">Level 2</div>
        <div class="btn-title">Approach Hint</div>
        <div class="btn-desc">reveals the algorithm family</div>
      </button>
      <button class="hint-btn" data-level="3" onclick="getHint(3)">
        <div class="btn-level">Level 3</div>
        <div class="btn-title">Pseudocode</div>
        <div class="btn-desc">step-by-step, no code yet</div>
      </button>
    </div>

    <!-- Error -->
    <div class="error-msg" id="error-msg"></div>

    <!-- Response -->
    <div class="response-area" id="response-area">
      <div class="response-header">
        <span class="response-badge" id="response-badge"></span>
        <button class="copy-btn" onclick="copyHint()">copy</button>
      </div>
      <div class="loading" id="loading">
        <span></span><span></span><span></span>
      </div>
      <div class="response-body" id="response-body" style="display:none;"></div>
    </div>
  </div>

  <footer>breadcrumbles.ai · fastapi + ollama · follow the crumbs 🍞</footer>

  <script>
    const LEVEL_LABELS = {
      1: { text: '🟢 slight hint', cls: 'badge-1' },
      2: { text: '🔵 approach hint', cls: 'badge-2' },
      3: { text: '🩷 pseudocode hint', cls: 'badge-3' },
    };

    async function getHint(level) {
      const problem = document.getElementById('problem-input').value.trim();
      const language = document.getElementById('lang-select').value;
      const apiBase = document.getElementById('api-base').value.trim().replace(/\/$/, '');
      const errEl = document.getElementById('error-msg');
      const respArea = document.getElementById('response-area');
      const respBody = document.getElementById('response-body');
      const loading = document.getElementById('loading');
      const badge = document.getElementById('response-badge');

      // clear error
      errEl.classList.remove('visible');
      errEl.textContent = '';

      if (!problem) {
        errEl.textContent = '⚠ paste your problem statement above first.';
        errEl.classList.add('visible');
        return;
      }

      // disable all buttons
      document.querySelectorAll('.hint-btn').forEach(b => b.disabled = true);

      // show response area with loading
      respArea.classList.add('visible');
      loading.style.display = 'flex';
      respBody.style.display = 'none';

      // set badge
      const lbl = LEVEL_LABELS[level];
      badge.textContent = lbl.text;
      badge.className = 'response-badge ' + lbl.cls;

      // scroll to response
      respArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      try {
        const res = await fetch(`${apiBase}/hint/${level}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ problem, language }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(err.detail || 'server error');
        }

        const data = await res.json();
        respBody.textContent = data.hint;
        loading.style.display = 'none';
        respBody.style.display = 'block';

      } catch (e) {
        loading.style.display = 'none';
        respArea.classList.remove('visible');
        errEl.textContent = `✗ ${e.message}. Is your FastAPI server running?`;
        errEl.classList.add('visible');
      } finally {
        document.querySelectorAll('.hint-btn').forEach(b => b.disabled = false);
      }
    }

    function copyHint() {
      const text = document.getElementById('response-body').textContent;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = 'copied!';
        setTimeout(() => btn.textContent = 'copy', 2000);
      });
    }
  </script>
</body>
</html>
